<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | Essential Hub</title>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #000; font-family: 'Inter', sans-serif; margin: 0; }
        .navbar { background: #000 !important; padding: 20px 0; }
        .logo { color: #fff !important; text-decoration: none; font-weight: bold; letter-spacing: 1px; }
        .payment-container { max-width: 600px; margin: 40px auto; padding: 20px; }
        h2 { font-size: 24px; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 30px; }
        .payment-method { border: 1px solid #eee; margin-bottom: 15px; border-radius: 4px; overflow: hidden; }
        .method-header { padding: 20px; background: #f9f9f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .method-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #fff; }
        .method-content.active { max-height: 500px; padding: 20px; border-top: 1px solid #eee; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-verify { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-size: 12px; }
        .summary-box { background: #000; color: #fff; padding: 25px; margin-top: 30px; border-radius: 4px; }
        .btn-place { width: 100%; padding: 18px; background: #fff; color: #000; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-content" style="max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; padding: 0 20px;">
        <a href="index.html" class="logo">ESSENTIAL HUB</a>
        <a href="cart.html" style="color: #fff; text-decoration: none; font-size: 13px;">Back to Bag</a>
    </div>
</nav>

<div class="payment-container">
    <h2>PAYMENT</h2>
    <div class="payment-method">
        <div class="method-header" onclick="toggleMethod('upi-form')"><span>UPI (GPay, PhonePe, Paytm)</span><span>↓</span></div>
        <div id="upi-form" class="method-content">
            <input type="text" placeholder="Enter UPI ID">
            <button class="btn-verify" onclick="alert('UPI ID Verified!')">VERIFY</button>
            <button class="btn-place" style="background:#000; color:#fff;" onclick="startCashfreePayment('UPI')">PAY WITH UPI</button>
        </div>
    </div>
    <div class="payment-method">
        <div class="method-header" onclick="toggleMethod('card-form')"><span>Credit / Debit Card</span><span>↓</span></div>
        <div id="card-form" class="method-content">
            <input type="text" placeholder="Card Number">
            <button class="btn-place" style="background:#000; color:#fff;" onclick="startCashfreePayment('Card')">PAY WITH CARD</button>
        </div>
    </div>
    <div class="payment-method">
        <div class="method-header" onclick="toggleMethod('cod-form')"><span>Cash on Delivery (COD)</span><span>↓</span></div>
        <div id="cod-form" class="method-content">
            <button class="btn-place" style="background:#000; color:#fff;" onclick="finalizeOrder('COD_' + Date.now(), 'Order Placed (COD)', 'Cash on Delivery')">CONFIRM COD ORDER</button>
        </div>
    </div>
    <div class="summary-box">
        <div style="display: flex; justify-content: space-between; font-size: 18px;">
            <span>TOTAL AMOUNT</span>
            <span>₹<span id="final-amt">0</span></span>
        </div>
        <div id="coupon-info" style="font-size: 12px; margin-top: 10px; color: #ccc;"></div>
    </div>
</div>

<script>
    const cashfree = Cashfree({ mode: "sandbox" });
    let finalPayable = 0;

    function toggleMethod(id) {
        document.querySelectorAll('.method-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.toggle('active');
    }

    function loadAmount() {
        const checkoutInfo = JSON.parse(localStorage.getItem('tempCheckoutInfo'));
        if (checkoutInfo && checkoutInfo.finalPrice) {
            finalPayable = checkoutInfo.finalPrice;
            document.getElementById('final-amt').innerText = finalPayable.toLocaleString('en-IN');
            if(checkoutInfo.couponUsed) {
                document.getElementById('coupon-info').innerText = "Applied: " + checkoutInfo.couponUsed;
            }
        } else {
            // Fallback if price is missing
            window.location.href = 'cart.html';
        }
    }

    async function startCashfreePayment(method) {
        if (!JSON.parse(localStorage.getItem('userData'))) return alert("Please Login First!");
        alert("Simulating Gateway...");
        setTimeout(() => finalizeOrder("CF_" + Date.now(), "Paid (Online)", method), 1500);
    }

    async function finalizeOrder(transactionId, orderStatus, methodUsed) {
        const cart = JSON.parse(localStorage.getItem('userCart')) || [];
        const checkoutInfo = JSON.parse(localStorage.getItem('tempCheckoutInfo'));
        
        if (!checkoutInfo) return alert("Session expired, please go back to checkout.");

        const orderData = {
            customerName: checkoutInfo.name,
            customerEmail: checkoutInfo.email,
            customerPhone: checkoutInfo.phone,
            shippingAddress: checkoutInfo.address,
            items: cart,
            totalAmount: finalPayable, // Discount wala price hi database mein jayega
            paymentId: transactionId,
            paymentMethod: methodUsed,
            status: orderStatus,
            couponApplied: checkoutInfo.couponUsed || "None",
            orderDate: new Date()
        };

        try {
            const response = await fetch('http://localhost:4000/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });

            if (response.ok) {
                localStorage.removeItem('userCart');
                localStorage.removeItem('tempCheckoutInfo');
                window.location.href = 'payment-success.html';
            } else { alert("Error saving order!"); }
        } catch (err) { alert("Backend Server error!"); }
    }
    window.onload = loadAmount;
</script>
</body>
</html>
