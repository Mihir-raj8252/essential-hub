<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Essential Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Base Styling */
        body { background-color: #ffffff; color: #000; font-family: 'Inter', sans-serif; margin: 0; position: relative; min-height: 100vh; }
        .navbar { background: #000 !important; border-bottom: none !important; padding: 20px 0; }
        .logo { color: #fff !important; text-decoration: none; font-weight: bold; letter-spacing: 1px; }
        .back-link { color: #fff !important; text-decoration: underline; font-size: 13px; }
        .cart-container { max-width: 1100px; margin: 60px auto; padding: 20px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 50px; position: relative; }
        .cart-items-section h2 { font-weight: 600; font-size: 24px; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .cart-item { display: flex; gap: 20px; border-bottom: 1px solid #eee; padding: 25px 0; align-items: center; position: relative; background: rgba(255,255,255,0.6); }
        .serial-no { font-weight: bold; font-size: 18px; color: #888; margin-right: 10px; }
        .cart-item img { width: 90px; height: 120px; object-fit: cover; border: 1px solid #eee; }
        .item-details h3 { font-size: 17px; margin: 0 0 5px 0; text-transform: uppercase; }
        .item-details p { color: #555; margin: 5px 0; font-size: 14px; }
        .qty-box { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .qty-input { width: 60px; padding: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold; }
        .checkout-section { background: rgba(249, 249, 249, 0.9); padding: 30px; border: 1px solid #eee; border-radius: 4px; }
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; margin: 25px 0 15px; color: #333; border-left: 3px solid #000; padding-left: 10px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; margin-bottom: 12px; font-family: inherit; box-sizing: border-box; background: #fff; }
        .row { display: flex; gap: 10px; }
        .total-row { display: flex; justify-content: space-between; margin-top: 15px; font-size: 16px; }
        .final-price { font-size: 22px; font-weight: 700; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 20px; }
        .btn-order { width: 100%; padding: 18px; background: #000; color: #fff; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-order:hover { background: #333; }
        @media (max-width: 850px) { .cart-container { grid-template-columns: 1fr; } }

        /* Coupon Styling */
        .coupon-section { margin-top: 20px; padding: 15px; border: 1px dashed #000; background: #fff; }
        .coupon-input-group { display: flex; gap: 5px; margin-top: 10px; }
        .coupon-input-group input { flex: 1; margin-bottom: 0; text-transform: uppercase; }
        .btn-coupon { background: #000; color: #fff; border: none; padding: 10px 15px; cursor: pointer; font-size: 12px; font-weight: 600; }
        #coupon-msg { font-size: 12px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-content" style="max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; padding: 0 20px; align-items: center;">
        <a href="index.html" class="logo">ESSENTIAL HUB</a>
        <a href="javascript:history.back()" class="back-link" style="text-decoration: none; display: flex; align-items: center; gap: 5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            BACK
        </a>
    </div>
</nav>

<div class="cart-container">
    <div class="cart-items-section">
        <h2>SHOPPING BAG</h2>
        <div id="cart-list"></div>
    </div>

    <div class="checkout-section">
        <div class="section-title">Contact Information</div>
        <div class="input-group">
            <input type="text" id="cust-name" placeholder="Full Name">
            <input type="text" id="cust-phone" placeholder="Mobile Number">
            <input type="email" id="cust-email" placeholder="Email ID">
        </div>

        <div class="section-title">Shipping Address</div>
        <div class="input-group">
            <input type="text" id="apt" placeholder="Flat, House no., Building, Apartment">
            <input type="text" id="street" placeholder="Area, Street, Sector, Village">
            <input type="text" id="landmark" placeholder="Landmark (e.g. near Apollo Hospital)">
            
            <div class="row">
                <input type="text" id="district" placeholder="District" readonly style="background: #f0f0f0; cursor: not-allowed;">
                <input type="text" id="state" placeholder="State" readonly style="background: #f0f0f0; cursor: not-allowed;">
            </div>
            
            <div class="row">
                <input type="text" id="pincode" placeholder="Pincode" maxlength="6" onkeyup="fetchLocation()">
                <input type="text" id="city" placeholder="Town/City">
            </div>
        </div>

        <div class="coupon-section">
            <span style="font-size: 13px; font-weight: 600;">HAVE A COUPON?</span>
            <div class="coupon-input-group">
                <input type="text" id="coupon-code" placeholder="Enter Code">
                <button class="btn-coupon" onclick="applyCoupon()">APPLY</button>
            </div>
            <span id="coupon-msg"></span>
        </div>

        <div class="final-price">
            <div class="total-row" id="discount-row" style="display: none; color: green; font-size: 14px; margin-bottom: 10px;">
                <span>Coupon Discount:</span>
                <span>- ₹<span id="discount-amt">0</span></span>
            </div>
            <div class="total-row">
                <span>Total Amount:</span>
                <span>₹<span id="final-total">0</span></span>
            </div>
            <button class="btn-order" onclick="proceedToPayment()" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px;">
                CHECKOUT 
                <div class="payment-logos" style="display: flex; gap: 5px; align-items: center; background: white; padding: 2px 8px; border-radius: 4px;">
                    <img src="https://img.icons8.com/color/48/google-pay.png" width="20" alt="GPay">
                    <img src="https://download.logo.wine/logo/PhonePe/PhonePe-Logo.wine.png" width="30" style="object-fit: contain;" alt="PhonePe">
                    <img src="https://img.icons8.com/color/48/paytm.png" width="20" alt="Paytm">
                </div>
                <span style="font-size: 18px; margin-left: 5px;">›</span>
            </button>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:4000/"; 
    let subtotal = 0;
    let discountValue = 0;
    let appliedCouponName = "";

    async function fetchLocation() {
        const pincode = document.getElementById('pincode').value;
        if (pincode.length === 6) {
            try {
                const response = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
                const data = await response.json();
                if (data[0].Status === "Success") {
                    const details = data[0].PostOffice[0];
                    document.getElementById('district').value = details.District;
                    document.getElementById('state').value = details.State;
                }
            } catch (error) { console.error("Error:", error); }
        }
    }

    function checkAuth() {
        const userData = JSON.parse(localStorage.getItem('userData'));
        if (!userData) { alert("Please login first"); window.location.href = "login.html"; return null; }
        return userData;
    }

    let cart = JSON.parse(localStorage.getItem('userCart')) || [];

    function renderCart() {
        const userData = checkAuth();
        if(!userData) return;
        document.getElementById('cust-email').value = userData.email;
        const container = document.getElementById('cart-list');
        subtotal = 0;
        cart = JSON.parse(localStorage.getItem('userCart')) || [];
        if (cart.length === 0) {
            container.innerHTML = "<p style='padding: 50px 0; text-align:center;'>Your bag is empty.</p>";
            document.getElementById('final-total').innerText = "0";
            return;
        }
        container.innerHTML = cart.map((item, index) => {
            let price = typeof item.price === 'string' ? parseInt(item.price.replace(/[₹,]/g, '')) : item.price;
            let qty = item.quantity || 1;
            let itemSub = price * qty;
            subtotal += itemSub;
            const imgPath = (item.image && item.image.startsWith('http')) ? item.image : BASE_URL + item.image;
            return `<div class="cart-item">
                <span class="serial-no">${index + 1}.</span>
                <img src="${imgPath}" alt="${item.name}">
                <div class="item-details">
                    <h3>${item.name}</h3>
                    <p>Size: <strong>${item.size || 'M'}</strong></p>
                    <p>Unit Price: ₹${price.toLocaleString('en-IN')}</p>
                    <div class="qty-box"><input type="number" class="qty-input" value="${qty}" onchange="changeQty(${index}, this.value)" min="1" max="5"></div>
                    <button onclick="deleteItem(${index})" style="color:red; cursor:pointer; background:none; border:none; text-decoration:underline;">Remove</button>
                </div>
                <div style="margin-left: auto; font-weight: bold;">₹${itemSub.toLocaleString('en-IN')}</div>
            </div>`;
        }).join('');
        updateFinalDisplay();
    }

    function applyCoupon() {
        const code = document.getElementById('coupon-code').value.trim().toUpperCase();
        const msg = document.getElementById('coupon-msg');
        
        if(code === "EH10") {
            discountValue = Math.round(subtotal * 0.10); // 10% Off
            appliedCouponName = "EH10 (10% OFF)";
            msg.innerText = "Coupon Applied Successfully!";
            msg.style.color = "green";
        } else if(code === "FIRST50") {
            discountValue = 50; // ₹50 Flat Off
            appliedCouponName = "FIRST50 (₹50 OFF)";
            msg.innerText = "Coupon Applied Successfully!";
            msg.style.color = "green";
        } else {
            discountValue = 0;
            appliedCouponName = "";
            msg.innerText = "Invalid Coupon Code";
            msg.style.color = "red";
        }
        updateFinalDisplay();
    }

    function updateFinalDisplay() {
        const finalTotal = subtotal - discountValue;
        document.getElementById('final-total').innerText = finalTotal.toLocaleString('en-IN');
        
        if(discountValue > 0) {
            document.getElementById('discount-row').style.display = 'flex';
            document.getElementById('discount-amt').innerText = discountValue.toLocaleString('en-IN');
        } else {
            document.getElementById('discount-row').style.display = 'none';
        }
    }

    function changeQty(index, val) {
        cart[index].quantity = parseInt(val);
        localStorage.setItem('userCart', JSON.stringify(cart));
        renderCart();
    }

    function deleteItem(index) {
        cart.splice(index, 1);
        localStorage.setItem('userCart', JSON.stringify(cart));
        renderCart();
    }

    function proceedToPayment() {
        const userData = checkAuth();
        if(!userData) return;

        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const address = {
            apt: document.getElementById('apt').value,
            street: document.getElementById('street').value,
            landmark: document.getElementById('landmark').value,
            district: document.getElementById('district').value,
            state: document.getElementById('state').value,
            pincode: document.getElementById('pincode').value,
            city: document.getElementById('city').value
        };

        if(!name || !phone || !address.pincode || !address.district) {
            alert("Please fill the address details first.");
            return;
        }

        const checkoutInfo = { 
            name, 
            phone, 
            email: document.getElementById('cust-email').value, 
            address,
            finalPrice: subtotal - discountValue, // Discounted Price bhejna
            couponUsed: appliedCouponName
        };
        localStorage.setItem('tempCheckoutInfo', JSON.stringify(checkoutInfo));

        window.location.href = 'payment.html';
    }

    window.onload = renderCart;
</script>
</body>
</html>
