<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ESSENTIAL HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .header { background: #000; color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 20px; }
        .admin-section { max-width: 900px; margin: 0 auto; }
        .form-card { background: #fff; padding: 25px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        textarea { grid-column: span 2; height: 80px; }
        .image-upload-box { grid-column: span 2; background: #f9f9f9; padding: 20px; border-radius: 4px; border: 2px dashed #ccc; text-align: center; }
        .btn-save { grid-column: span 2; padding: 15px; background: #000; color: #fff; font-weight: bold; border: none; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        
        /* Manage Products Styling */
        .product-list-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .product-item:last-child { border-bottom: none; }
        .btn-delete { background: #ff4d4d; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-delete:hover { background: #cc0000; }

        .order-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 15px; border-left: 5px solid #000; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .item-box { display: flex; align-items: center; gap: 10px; background: #fafafa; padding: 10px; border-radius: 4px; margin-top: 5px; }
        .item-img { width: 45px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-Delivered { background: #e6fffa; color: #2c7a7b; } 
        .status-Shipped { background: #ebf8ff; color: #2b6cb0; }
        .status-Pending { background: #fffaf0; color: #9b6a00; border: 1px solid #fbd38d; }

        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-status { padding: 8px 15px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid #000; border-radius: 4px; background: #fff; transition: 0.2s; }
        .btn-status:hover { background: #000; color: #fff; }
    </style>
</head>
<body>

<div class="admin-section">
    <div class="header">
        <h2 style="margin:0;">ESSENTIAL HUB ADMIN</h2>
        <span id="order-count">Total Orders: 0</span>
    </div>

    <div class="form-card">
        <h3 style="margin-top:0;">+ Add New Product</h3>
        <div class="form-grid">
            <input type="text" id="p-name" placeholder="Product Name">
            <input type="number" id="p-price" placeholder="Price (INR)">
            <input type="text" id="p-fabric" placeholder="Fabric Details">
            <input type="text" id="p-tag" placeholder="Tag (New, Best Seller)">
            <div class="image-upload-box">
                <p style="margin: 0 0 10px 0; font-size: 13px; font-weight: bold;">SELECT PRODUCT PHOTOS</p>
                <input type="file" id="p-images" multiple accept="image/*" style="border: none;">
            </div>
            <textarea id="p-desc" placeholder="Product Description"></textarea>
            <button class="btn-save" id="upload-btn" onclick="saveProduct()">UPLOAD PRODUCT</button>
        </div>
    </div>

    <div class="product-list-card">
        <h3 style="margin-top:0; border-bottom: 2px solid #000; padding-bottom: 5px;">MANAGE LIVE PRODUCTS</h3>
        <div id="product-list-container">Loading products...</div>
    </div>

    <h3 style="margin-bottom:15px;">RECENT ORDERS</h3>
    <div id="orders-container">Loading orders...</div>
</div>

<script>
    const BASE_URL = "http://localhost:4000/";

    // ✅ SAVE PRODUCT
    async function saveProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const fabric = document.getElementById('p-fabric').value;
        const tag = document.getElementById('p-tag').value;
        const desc = document.getElementById('p-desc').value;
        const imageFiles = document.getElementById('p-images').files;

        if(!name || !price || imageFiles.length === 0) {
            return alert("Fill Name, Price and Photos!");
        }

        const btn = document.getElementById('upload-btn');
        btn.innerText = "UPLOADING..."; btn.disabled = true;

        const formData = new FormData();
        formData.append('name', name); formData.append('price', price);
        formData.append('fabric', fabric); formData.append('tag', tag);
        formData.append('description', desc);

        for (let i = 0; i < imageFiles.length; i++) {
            formData.append('productImages', imageFiles[i]);
        }

        try {
            const response = await fetch(`${BASE_URL}api/products`, { method: 'POST', body: formData });
            if (response.ok) { alert("Success! Product Live."); location.reload(); }
        } catch (err) { alert("Server error."); btn.innerText = "UPLOAD PRODUCT"; btn.disabled = false; }
    }

    // ✅ FETCH & MANAGE PRODUCTS (New Logic)
    async function fetchProducts() {
        try {
            const response = await fetch(`${BASE_URL}api/products`);
            const products = await response.json();
            const container = document.getElementById('product-list-container');
            container.innerHTML = '';

            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'product-item';
                item.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${p.images[0].startsWith('http') ? p.images[0] : BASE_URL + p.images[0]}" width="30" height="40" style="object-fit:cover; border-radius:2px;">
                        <span style="font-size:13px; font-weight:600;">${p.name}</span>
                        <span style="font-size:12px; color:#888;">(₹${p.price})</span>
                    </div>
                    <button class="btn-delete" onclick="deleteProduct('${p._id}')">DELETE</button>
                `;
                container.appendChild(item);
            });
        } catch (err) { document.getElementById('product-list-container').innerHTML = "Error loading products."; }
    }

    // ✅ DELETE PRODUCT LOGIC
    async function deleteProduct(id) {
        if(!confirm("Are you sure you want to delete this product? This cannot be undone.")) return;

        try {
            const response = await fetch(`${BASE_URL}api/products/${id}`, { method: 'DELETE' });
            if (response.ok) { alert("Product deleted!"); fetchProducts(); }
            else { alert("Delete failed."); }
        } catch (err) { alert("Connection error."); }
    }

    // ✅ FETCH ORDERS
    async function fetchOrders() {
        try {
            const response = await fetch(`${BASE_URL}api/admin/orders`);
            const orders = await response.json();
            const container = document.getElementById('orders-container');
            document.getElementById('order-count').innerText = `Total Orders: ${orders.length}`;
            container.innerHTML = '';

            orders.forEach(order => {
                const status = order.status || 'Pending';
                const addr = order.shippingAddress;
                const addressStr = addr ? `${addr.apt || ''} ${addr.street || addr.address || ''}, ${addr.city || ''}`.trim() : "N/A";

                const orderCard = document.createElement('div');
                orderCard.className = 'order-card';
                orderCard.innerHTML = `
                    <div class="order-header">
                        <div><b>${order.customerName}</b><br><small>${new Date(order.orderDate).toLocaleString()}</small></div>
                        <div style="text-align:right"><span class="status-badge status-${status}">${status}</span><br><b>₹${order.totalAmount}</b></div>
                    </div>
                    <div style="font-size:12px; color:#555; margin-bottom:10px;"><b>Email:</b> ${order.customerEmail} | <b>Address:</b> ${addressStr}</div>
                    <div>
                        ${order.items.map(item => {
                            const imgUrl = (item.image && item.image.startsWith('http')) ? item.image : BASE_URL + item.image;
                            return `<div class="item-box"><img src="${imgUrl}" class="item-img" onerror="this.src='https://via.placeholder.com/45x60'"><span style="font-size:12px;"><strong>${item.name}</strong> (x${item.quantity})</span></div>`;
                        }).join('')}
                    </div>
                    <div class="action-btns">
                        <button class="btn-status" onclick="updateStatus('${order._id}', 'Shipped')">Mark Shipped</button>
                        <button class="btn-status" onclick="updateStatus('${order._id}', 'Delivered')">Mark Delivered</button>
                    </div>
                `;
                container.appendChild(orderCard);
            });
        } catch (err) { container.innerHTML = "Failed to load orders."; }
    }

    async function updateStatus(orderId, newStatus) {
        try {
            const response = await fetch(`${BASE_URL}api/orders/${orderId}/status`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: newStatus }) });
            if (response.ok) { alert("Status updated!"); fetchOrders(); }
        } catch (err) { alert("Error."); }
    }

    window.onload = () => { fetchProducts(); fetchOrders(); };
</script>
</body>
</html>
