<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | ESSENTIAL HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; margin: 0; text-align: center; background: #fff; }
        .card { padding: 40px; }
        .icon { font-size: 50px; background: #000; color: #fff; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin: 0 auto 20px; }
        h1 { font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; color: #000; }
        p { color: #666; margin-bottom: 10px; }
        .order-info { margin-bottom: 30px; font-size: 14px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn { padding: 15px 30px; background: #000; color: #fff; text-decoration: none; font-weight: bold; font-size: 13px; width: 200px; display: inline-block; transition: opacity 0.2s; }
        .btn-secondary { background: #fff; color: #000; border: 1px solid #000; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>ORDER PLACED.</h1>
        <p>Thank you for choosing Essential Hub. Your order is being processed.</p>
        
        <div class="order-info">
            Order ID: <span id="order-id">#EH-2026-XXXX</span> <br>
            Date: <span id="current-date"></span>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn">BACK TO SHOP</a>
            <a href="account-settings.html" class="btn btn-secondary">VIEW ORDER HISTORY</a>
        </div>
    </div>

    <script>
        // 1. Random Order ID generate karne ke liye (Jab tak backend se real ID na aaye)
        const randomID = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('order-id').innerText = "#EH-2026-" + randomID;

        // 2. Aaj ki date dikhane ke liye
        const today = new Date();
        const dateOptions = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('current-date').innerText = today.toLocaleDateString('en-IN', dateOptions);

        // 3. Payment success ke baad Cart clear karne ka logic
        // Ye tabhi kaam karega agar aapka cart 'cartItems' naam se localStorage mein hai
        localStorage.removeItem('cartItems'); 
        
        // Agar aapke script.js mein cart update karne ka function hai, 
        // toh aap yahan count ko 0 bhi set kar sakte hain.
        localStorage.setItem('cartCount', '0');
    </script>
</body>
</html>
